<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Portal | Puranghat College</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #004d40; --secondary: #ff9800; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* Fixed Header with Logo (Center Alignment) */
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 70px 20px; /* প্যাডিং একটু বাড়িয়ে দেওয়া হয়েছে লোগোর জন্য */
            text-align: center; 
            border-bottom: 6px solid var(--secondary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        /* কলেজের লোগো স্টাইল */
        .college-logo {
            width: 130px; /* লোগোর সাইজ */
            height: 130px;
            border-radius: 50%; /* গোল করার জন্য */
            border: 4px solid #fff;
            background: #fff;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 15px; /* লোগো এবং নামের মাঝে দূরত্ব */
            position: absolute;
            top: 0px; /* লোগোকে হেডারের অর্ধেক উপরে তুলতে */
            left: 50%;
            transform: translateX(-50%);
        }

        .header-content { margin-top: 60px; /* লোগোর জন্য জায়গা ছেড়ে দেওয়া */ }
        .header h1 { margin: 0; font-size: clamp(26px, 8vw, 44px); font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .header p { margin: 10px 0 0; font-size: 16px; opacity: 0.9; font-weight: 300; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 15px; }
        
        .form-card { 
            background: var(--white); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            border: 1px solid #e0e0e0;
        }

        h2 { 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 35px; 
            font-size: 22px; 
            border-bottom: 2px solid #f0f0f0; 
            padding-bottom: 15px;
            text-transform: uppercase;
        }

        /* Responsive Grid Layout */
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 20px; }
        @media (max-width: 650px) { .row { grid-template-columns: 1fr; } }

        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: 700; color: #444; font-size: 14px; }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e1e4e8; 
            border-radius: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
            outline: none;
            color: #333;
        }
        
        input:focus, select:focus { border-color: var(--secondary); box-shadow: 0 0 8px rgba(255,152,0,0.15); }

        /* Submit Button */
        .btn-container { text-align: center; margin-top: 35px; }
        .btn { 
            background: var(--secondary); 
            color: white; 
            padding: 18px 60px; 
            border: none; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.4s; 
            text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(255,152,0,0.3);
        }
        .btn:hover { background: #e68a00; transform: translateY(-3px); box-shadow: 0 12px 20px rgba(255,152,0,0.4); }

        .footer { text-align: center; padding: 50px; color: #777; font-size: 14px; }
        .logo-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

.logo-wrapper img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid white;
    object-fit: cover;
    background: white;
}

.header {
    text-align: center;
    padding: 40px 20px;
}
    </style>
</head>
<body>
<div class="header">
    <div class="logo-wrapper">
        <img src="https://i.ibb.co/5g8GNqJs/636880279-887390993920777-8859387215607161775-n.jpg" alt="Logo">
    </div>
    <div class="header-content">
        <h1>PURANGHAT COLLEGE</h1>
        <p>TAHIRPUR, SUNAMGANJ | ESTABLISHED: 2019</p>
    </div>
</div>

<div class="container">
    <div class="form-card">
        <h2>Online Admission Form - 2026</h2>
        <form id="admissionForm">
            
            <div class="row">
                <div class="form-group">
                    <label>Student's Full Name (Capital Letters):</label>
                    <input type="text" id="sname" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number (Active):</label>
                    <input type="tel" id="mobile" placeholder="01XXXXXXXXX" pattern="[0-9]{11}" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Father's Name:</label>
                    <input type="text" id="fname" required>
                </div>
                <div class="form-group">
                    <label>Mother's Name:</label>
                    <input type="text" id="mname" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Date of Birth:</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group">
                    <label>Email Address:</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>SSC Roll No:</label>
                    <input type="number" id="roll" placeholder="6 Digits" required>
                </div>
                <div class="form-group">
                    <label>SSC Registration No:</label>
                    <input type="number" id="reg" placeholder="10 Digits" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>SSC Education Board:</label>
                    <select id="board" required>
                        <option value="">-- Choose Board --</option>
                        <option>Sylhet</option><option>Dhaka</option><option>Chattogram</option>
                        <option>Rajshahi</option><option>Cumilla</option><option>Barishal</option>
                        <option>Jashore</option><option>Dinajpur</option><option>Mymensingh</option>
                        <option>Madrasah</option><option>Technical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>SSC Passing Year:</label>
                    <select id="passYear" required>
                        <option>2026</option>
                        <option>2025</option>
                        <option>2024</option>
                        <option>2023</option>
                        <option>2022</option>
                        <option>2021</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Applied Group:</label>
                    <select id="group" required>
                        <option value="">-- Select Group --</option>
                        <option>Science</option>
                        <option>Humanities</option>
                        <option>Business Studies</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>District:</label>
                    <select id="district" required>
                        <option value="Sunamganj">Sunamganj</option>
                        <option value="Sylhet">Sylhet</option>
                        <option value="Netrokona">Netrokona</option>
                        <option value="Kishoreganj">Kishoreganj</option>
                        <option value="Dhaka">Dhaka</option>
                        </select>
                </div>
            </div>

            <div class="btn-container">
                <button type="button" class="btn" onclick="submitApplication()">Confirm Submission</button>
            </div>
        </form>
    </div>
</div>

<div class="footer">
    &copy; 2026 Puranghat College | All Rights Reserved.<br>
    Developed by <b>Shuvo</b>
</div>

<script>
    // 1. Firebase Configuration (MUST PASTE YOUR DATA HERE)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Data Submission Function
    function submitApplication() {
        const form = document.getElementById('admissionForm');
        
        // Basic Validation
        if(!form.checkValidity()) {
            alert("সবগুলো ঘর সঠিক তথ্য দিয়ে পূরণ করুন!");
            return;
        }

        // Collecting Data
        const formData = {
            student_name: document.getElementById('sname').value,
            mobile: document.getElementById('mobile').value,
            father_name: document.getElementById('fname').value,
            mother_name: document.getElementById('mname').value,
            dob: document.getElementById('dob').value,
            email: document.getElementById('email').value,
            ssc_roll: document.getElementById('roll').value,
            ssc_reg: document.getElementById('reg').value,
            board: document.getElementById('board').value,
            passing_year: document.getElementById('passYear').value,
            group: document.getElementById('group').value,
            district: document.getElementById('district').value,
            submitted_at: new Date().toLocaleString()
        };

        // Saving to Firebase
        db.ref('admissions').push(formData)
        .then(() => {
            alert("অভিনন্দন! আপনার আবেদনটি সফলভাবে জমা হয়েছে।");
            form.reset();
        })
        .catch((error) => {
            alert("Submission failed: " + error.message);
        });
    }
</script>

</body>
</html>
